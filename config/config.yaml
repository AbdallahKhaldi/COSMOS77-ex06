# COSMOS77-ex06 — single source of truth for every tunable (CLAUDE.md rule 4 / spec §10).
# Nothing here may be hardcoded in code: grid, moves, games, barriers, scoring, ports,
# URLs, model — all read through src/cosmos77_ex06/shared/config.py.
version: "1.00"

# --- Game rules (E1, E8) ---
grid_size: [5, 5]        # default 5x5 board; the sanity ladder overrides to 2x2..4x4
max_moves: 25            # moves per sub-game before the thief survives
num_games: 6             # sub-games per full game
max_barriers: 5          # barriers the cop may place per sub-game (impassable for both)
allow_diagonal: true     # diagonal moves permitted
turn_order: ["thief", "cop"]   # the thief moves first each turn
vision_radius: 1         # partial-observability window (cells) the MCP servers expose; enforces the Dec-POMDP observation function O

# Scoring table (spec): cop capture vs thief survival.
scoring:
  cop_win: 20
  thief_win: 10
  cop_loss: 5
  thief_loss: 5

# --- NL channel guard (E4, PRD §7.5/§10): flag coordinate-shaped leaks ---
# Every OUTGOING agent message is scanned against these regexes; a match sets
# coord_flagged=true on the transcript entry (graded proof the channel is prose).
nl_guard:
  coord_patterns:
    - '\d+\s*[,;]\s*\d+'           # "3,4" / "3; 4" pairs
    - '\brow\s*\d'                 # "row 3"
    - '\bcol\s*\d'                 # "col 4"
    - '\[\s*\d+\s*,\s*\d+\s*\]'    # "[3, 4]" bracketed pairs
    - '\(\s*\d+\s*,\s*\d+\s*\)'    # "(3,4)" parenthesized pairs

# --- Agent personas (E4 flavour): the in-character voice of the free-NL channel ---
# Pure TONE guidance injected into the agent prompt; the no-coordinates guard and the
# game logic are unaffected. Keep it clean (a professor reads the transcript) and on-topic.
# Edit freely to dial the edginess up or down.
persona:
  thief: "Play a roguish, down-on-your-luck thief with gallows humour: wry, sympathetic one-liners (a man's gotta eat, just trying to feed my kids, the streets raised me) while taunting the cop about never catching you."
  cop: "Play a wisecracking, world-weary noir detective: dry, witty, lightly sarcastic comebacks (heard that sob story a hundred times, pal) that stay clean and on the case."

# --- Decision strategy (E9): heuristic core + optional tabular Q-Table ---
strategy:
  enabled: false          # DEFAULT-OFF: when true the heuristic's suggested action
                          # is appended to the agent prompt as a HINT the LLM may
                          # accept or override (Phase-4 behaviour is unchanged off).

# Tabular Q-Learning hyper-parameters (Bellman update; offline self-play only).
qlearning:
  learning_rate: 0.1      # alpha — temporal-difference step size
  discount_factor: 0.9    # gamma — future-reward discount
  epsilon: 0.1            # epsilon-greedy exploration probability
  episodes: 200           # training episodes logged for the learning curve

# --- LLM (orchestrator only — never inside the MCP servers; E3) ---
llm:
  provider: gemini
  model: gemini-2.5-flash-lite  # spec §7.1 endorses free/basic models; lite is markedly less 503-congested than flash and billing lifts its cap
  temperature: 0.2
  max_retries: 6           # transient 429/5xx retries (Phase-7 full game makes hundreds of free-tier calls; raised for the long live run)
  retry_base_seconds: 2.0  # exponential backoff base when the server suggests no delay
  min_call_interval_seconds: 0.5  # paid tier (billing on): no free RPM cap, so pace lightly; retry handles transient 503s

# --- MCP servers (E2/E6): two FastMCP servers on separate ports, token auth ---
mcp:
  host: "0.0.0.0"          # bind interface for both FastMCP servers (override per deployment)
  cop_url: "http://localhost:8001/mcp"
  thief_url: "http://localhost:8002/mcp"
  cop_port: 8001
  thief_port: 8002

# --- Automated report (E7): the cop agent auto-emails the JSON body here ---
report:
  to: "rmisegal+uoh26b@gmail.com"
  timezone: "Asia/Jerusalem"
  auto_send: false          # when true, run_full_game auto-emails the JSON at game end (E7/E5);
                            # default OFF so a missing credentials.json never crashes a run.
  scope: "https://www.googleapis.com/auth/gmail.send"  # minimal OAuth scope (compose+send only)
  credentials_file: "credentials.json"  # OAuth Desktop client secrets (gitignored, repo root)
  token_file: "token.json"  # cached OAuth token written after first consent (gitignored)
  subject: "COSMOS77-ex06 internal_game report"  # email subject (metadata; body is JSON-only)

# --- Group / submission metadata ---
group:
  name: COSMOS77
  github_repo: "https://github.com/AbdallahKhaldi/COSMOS77-ex06"

# --- Roster (E7 report §9.1 students[]): each {id, name_en, name_he} ---
students:
  - id: "212389712"
    name_en: "Abdallah Khaldi"
    name_he: "עבדאללה ח'אלדי"
  - id: "323118794"
    name_en: "Tasneem Natour"
    name_he: "תסנים נאטור"

# --- GUI (E10): pygame real-time viewer; config-driven, never hardcoded ---
gui:
  enabled: false          # default off; --gui or SDK gui=True requests it; headless probe has final say
  cell_size: 96           # pixels per grid cell
  panel_height: 132       # message/scoreboard strip height (pixels)
  fps: 2                  # turn-paced; one frame per turn, slow enough to watch
  caption: "COSMOS77-ex06 — Cops & Robbers over MCP"
  screenshot_key: "s"
  quit_key: "q"
  message_lines: 2        # wrapped lines per agent message in the panel
  colors:                 # theme resolved into render.py (no literals in code)
    background: [18, 18, 24]
    grid_line: [60, 60, 70]
    cell: [30, 30, 38]
    cop: [60, 130, 240]
    thief: [230, 70, 70]
    barrier: [40, 40, 40]
    capture: [250, 210, 60]
    text: [235, 235, 235]

# --- Structured CLI comms logs (E10/E6): one record per turn ---
logging:
  format: "human"         # "human" | "jsonl"
  show_server_url: true   # MUST be true so cloud-MCP comms are provable (E10/E6)
  show_full_message: true # never truncate the NL message in the log (only the GUI panel truncates)

# --- Inter-group BONUS (E12, ready-to-activate; spec §12 / PRD_bonus.md) ---
# Flip `enabled` and fill the placeholders ONLY after a partner group is secured.
# The four MCP URLs + the shared bonus token are exchanged at coordination time;
# group_1 = OUR group (COSMOS77), group_2 = the partner. The shared bonus token
# lives in .env as BONUS_MCP_TOKEN (Rule 9 — never in the repo; rotation revokes it).
bonus:
  enabled: false                            # flip to true once a partner is secured
  group_1: "COSMOS77"                        # orientation, fixed at coordination time
  group_2: "PARTNER_GROUP_CODE"              # placeholder — the partner's group code
  github_repo_group_2: "https://github.com/PARTNER/PARTNER-repo"  # placeholder
  students_group_2: []                       # [{id: "<id>", name: "<name>"}, ...]
  mcp:                                        # the FOUR public HTTPS MCP URLs (placeholders)
    group_1_cop: "https://OUR-cop.example/mcp"
    group_1_thief: "https://OUR-thief.example/mcp"
    group_2_cop: "https://THEIR-cop.example/mcp"
    group_2_thief: "https://THEIR-thief.example/mcp"
  engine_runner: "group_1"                    # who runs the orchestrator (single-engine)
  claim:                                      # bonus_claim schedule (Rule 4 — never hardcoded)
    win: 10
    lose: 7
    tie: 5

# --- Output directories ---
paths:
  results: results
  reports: reports
  assets: assets
